<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>JRStream</title>
<link rel="icon" type="image/png" sizes="32x32" href="https://www.iconpacks.net/icons/1/free-icon-broadcast-484.png">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">

<style>
*{
	margin:0;
	padding:0;
	box-sizing:border-box;
	font-family:Arial,sans-serif;
}
body {
	margin: 0;
    background: #000;
    color: #fff;
    overflow: hidden;
    height: 100vh;
}
.topbar {
    height: 70px;
    background: rgb(0 0 0);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 15px;
    position: relative;
    z-index: 10;
    border-bottom: 1px solid #101010;
    width: 100%;
}
.menu-btn{
	font-size:26px;
	cursor:pointer;
	user-select:none;
}
.logo {
    border-radius: 4px;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Audiowide", sans-serif;
    font-weight: 400;
    font-style: normal;
    color: #323232;
    line-height: 1;
    padding: 10px 15px;
    text-align: center;
    font-size: 20px;
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translateX(-50%) translateY(-50%);
}
.current-channel {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 14px;
    background: #ffffff;
    padding: 6px 10px;
    border-radius: 4px;
}
.live-dot {
    width: 8px;
    height: 8px;
    background: #ff0000;
    border-radius: 50%;
    animation: blink 1s infinite;
}
@keyframes blink{
	0%,100%{opacity:1;}
	50%{opacity:0.2;}
}
.current-channel img {
    display: block;
    width: 30px;
    height: auto;
    object-fit: cover;
    background: #ffffff;
    border: 1px solid #dfdfdf;
    padding: 4px;
    border-radius: 4px;
    aspect-ratio: 1;
    object-position: left;
}
.channel-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}
.channel-text .label {
    font-size: 10px;
    color: #ff0000;
    letter-spacing: 2px;
}
.channel-text #currentName {
    font-size: 14px;
    color: #323232;
    transition: 0.3s;
    font-weight: 600;
    text-transform: capitalize;
	font-family: "Audiowide", sans-serif;
}
.buffer {
    font-size: 17px;
    color: #323232;
    animation: buffer 1s infinite;
    display: none;
}
@keyframes buffer{
	0%{opacity:0.1;}
	50%{opacity:1;}
	100%{opacity:0.1;}
}
.container {
	height:calc(100vh - 70px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 15px;
}
.player-box {
    width: 100%;
	height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 7px;
    position: relative;
}
.player-box video {
    display: block;
    width: 100% !important;
    height: 100% !important;
	object-fit: cover;
}
.nav-controls {
    position: absolute;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    pointer-events: none;
    padding: 0 5px;
    opacity: 1;
}
.nav-btn {
    width: 60px;
    height: 60px;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 100%;
    cursor: pointer;
    pointer-events: auto;
    transition: .2s;
    overflow: hidden;
    padding: 5px;
	opacity: 0.5;
}
.player-box .nav-controls .nav-btn:hover{
	background:#ff00004a;
	opacity: 1;
}
.nav-btn img {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: 100%;
    object-fit: cover;
    object-position: left;
	aspect-ratio: 1;
}
.sidebar {
    position: fixed;
    left: -320px;
    top: 70px;
    width: 300px;
    height: calc(100vh - 70px);
    background: #101010;
    transition: .3s ease;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 10px;
}
.sidebar.active{
	left:0;
}
.overlay {
    position: fixed;
    top: 70px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    background: rgb(0 0 0 / 50%);
    display: none;
    z-index: 15;
}
.overlay.active{
	display:block;
}
.controls {
    display: flex;
    gap: 10px;
}
.controls button {
    flex: 1;
    padding: 8px;
    border: none;
    background: #0f303f;
    color: #fff;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}
.search {
    padding: 0;
}
.search input {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 4px;
    background: #1c1c1c;
    color: #fff;
    outline: none;
}
.channels {
    overflow: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.channel {
    display: flex;
    align-items: center;
    cursor: pointer;
    transition: .2s;
    gap: 5px;
    border-radius: 4px;
    padding: 5px;
    border: 1px solid #1c1c1c;
}
.channel:hover {
    background: #1c1c1c;
}
.channel.active {
    background: #0f303f;
}
.channel img {
    width: 40px;
    height: 40px;
    border-radius: 100%;
    object-fit: cover;
    display: block;
	aspect-ratio: 1;
	object-position: left;
}
.channel .channel-title {
    font-size: 16px;
    line-height: 1.2;
}
.popup {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgb(0 0 0 / 80%);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}
.popup-box {
    background: #101010;
    padding: 20px;
    width: 300px;
    border-radius: 4px;
    display: flex;
    flex-direction: column;
    gap: 10px;
}
.popup-box h3 {
    font-size: 16px;
    font-weight: 600;
}
.popup-box input {
    padding: 10px;
    border: none;
    border-radius: 4px;
    background: #1c1c1c;
    color: #fff;
}
.popup-box button {
    padding: 5px;
    border-radius: 4px;
    background: #0f303f;
	color: #fff;
    border: none;
	cursor: pointer;
}
.popup-box button:last-child {
    background: #000000;
}
@media screen and (max-width: 740px) {
.channel-text {
    display: none;
}
.player-box {
    align-items: flex-start;
}
.player-box video {
    object-fit: contain;
    height: auto !important;
}
}
</style>

</head>

<body>

<div class="topbar">
	<div class="menu-btn" onclick="toggleMenu()">☰</div>
	<div class="logo">JRStream</div>
	<div class="current-channel" id="currentChannel">
	  <span class="live-dot"></span>
	  <img id="currentLogo" src=""/>
	  <div class="channel-text">
		<div class="label">NOW PLAYING</div>
		<div id="currentName">Loading...</div>
	  </div>
	  <div class="buffer" id="buffer">●●●</div>
	</div>
</div>

<div class="overlay" id="overlay" onclick="toggleMenu()"></div>

<div class="sidebar" id="sidebar">
	<div class="controls">
		<button onclick="showAddChannel()">+ Add Channel</button>
		<button onclick="showM3U()">Load M3U</button>
	</div>
	<div class="search">
		<input type="text" id="search" placeholder="Search channel...">
	</div>
	<div class="channels" id="channelList"></div>
</div>

<div class="container">
	<div class="player-box">
		<video id="video" controls autoplay muted playsinline></video>
		<div class="nav-controls">
		  <div class="nav-btn" id="prevBtn">
			<img id="prevLogo" src=""/>
		  </div>
		  <div class="nav-btn" id="nextBtn">
			<img id="nextLogo" src=""/>
		  </div>
		</div>
	</div>
</div>

<div id="popup" class="popup">
  <div class="popup-box">
    <h3 id="popupTitle">Add Channel</h3>
    <input id="inputName" placeholder="Channel Name">
    <input id="inputLogo" placeholder="Logo URL">
    <input id="inputUrl" placeholder="Stream URL or M3U URL">
    <button onclick="saveData()">Save</button>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<script>
let isM3U = false;

function showAddChannel(){
isM3U = false;
document.getElementById("popupTitle").innerText = "Add Channel";
document.getElementById("popup").style.display = "flex";
}

function showM3U(){
isM3U = true;
document.getElementById("popupTitle").innerText = "Load M3U Playlist URL";
document.getElementById("popup").style.display = "flex";
document.getElementById("inputName").style.display = "none";
document.getElementById("inputLogo").style.display = "none";
}

function closePopup(){
document.getElementById("popup").style.display = "none";
document.getElementById("inputName").style.display = "block";
document.getElementById("inputLogo").style.display = "block";
}

function saveData(){
const name = document.getElementById("inputName").value;
const logo = document.getElementById("inputLogo").value;
const url = document.getElementById("inputUrl").value;
/* SINGLE CHANNEL */
if(!isM3U){
channels.push({
name,
logo,
url,
category:"Custom"
});
render(channels);
closePopup();
return;
}
/* M3U PARSER */
fetch(url)
.then(res => res.text())
.then(data => {
const lines = data.split("\n");
for(let i=0;i<lines.length;i++){
if(lines[i].startsWith("#EXTINF")){
const name = lines[i].split(",")[1];
const stream = lines[i+1];
channels.push({
name:name,
logo:"https://dummyimage.com/100x100/00aaff/fff&text=TV",
url:stream,
category:"M3U"
});
}
}
render(channels);
loadChannel(channels[0]);
closePopup();
});
}

const channels = [
	{
		name:"Tapmad",
		logo:"",
		url:"https://premierleagpl23.akamaized.net/hls/live/2107108/tapmad-P2s6L_FiN@L-UrU/master.m3u8",
		category:"Sports"
	},
	{
		name:"T Sports",
		logo:"https://tsportscdn.s3.ap-southeast-1.amazonaws.com/uploads/settings/logo.png",
		url:"http://103.151.61.12/T-Sports.kutta/video.m3u8",
		category:"Sports"
	}
];

const M3U_URL =
"https://raw.githubusercontent.com/imShakil/tvlink/refs/heads/main/iptv.m3u8";

const sidebar = document.getElementById("sidebar");
const overlay = document.getElementById("overlay");
const list = document.getElementById("channelList");
const video = document.getElementById("video");
const current = document.getElementById("currentChannel");

let currentIndex = 0;
let hls;
/* MENU */
function toggleMenu(){
sidebar.classList.toggle("active");
overlay.classList.toggle("active");
}
/* LOAD CHANNEL */
function loadChannel(ch){
/* SHOW BUFFER */
document.getElementById("buffer").style.display = "inline-block";
/* FADE EFFECT */
const nameEl = document.getElementById("currentName");
const logoEl = document.getElementById("currentLogo");

nameEl.style.opacity = 0;
logoEl.style.opacity = 0;
/* update index */
currentIndex = channels.findIndex(c => c.name === ch.name);
/* active highlight */
document.querySelectorAll(".channel").forEach(el=>{
el.classList.remove("active");
});

const activeEl = document.getElementById(ch.name);
if(activeEl) activeEl.classList.add("active");
/* update nav */
updateNavPreview();
/* HLS */
if(hls){
hls.destroy();
}

if(Hls.isSupported()){
hls = new Hls();
hls.loadSource(ch.url);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,()=>{
video.play();
/* HIDE BUFFER */
document.getElementById("buffer").style.display = "none";
/* FADE IN UI */
setTimeout(()=>{
nameEl.innerText = ch.name;
logoEl.src = ch.logo;
nameEl.style.opacity = 1;
logoEl.style.opacity = 1;
},200);
});
}else{
video.src = ch.url;
video.play();
/* UI update */
document.getElementById("buffer").style.display = "none";
nameEl.innerText = ch.name;
logoEl.src = ch.logo;
nameEl.style.opacity = 1;
logoEl.style.opacity = 1;
}
}

async function loadRemotePlaylist(){

    try{

        const response = await fetch(M3U_URL);

        if(!response.ok){
            throw new Error("Cannot load playlist");
        }

        const text = await response.text();

        parseM3U(text);

        render(channels);

    }
    catch(err){

        console.error(err);

    }

}

function parseM3U(text){

    const lines = text
        .split(/\r?\n/)
        .map(l=>l.trim())
        .filter(Boolean);

    let current = null;

    for(const line of lines){

        if(line.startsWith("#EXTINF")){

            const name =
                line.split(",").pop()?.trim() || "Unknown";

            const logo =
                line.match(/tvg-logo="([^"]+)"/)?.[1] || "";

            const group =
                line.match(/group-title="([^"]+)"/)?.[1] || "Other";

            current={
                name,
                logo,
                category:group
            };

        }
        else if(
            current &&
            !line.startsWith("#")
        ){

            const exists =
                channels.some(
                    c=>c.url===line
                );

            if(!exists){

                channels.push({

                    name:current.name,

                    logo:current.logo,

                    url:line,

                    category:current.category

                });

            }

            current=null;

        }

    }

}

function updateNavPreview(){
let prevIndex = (currentIndex - 1 + channels.length) % channels.length;
let nextIndex = (currentIndex + 1) % channels.length;
document.getElementById("prevLogo").src = channels[prevIndex].logo;
document.getElementById("nextLogo").src = channels[nextIndex].logo;
/* bind click */
document.getElementById("prevBtn").onclick = prevChannel;
document.getElementById("nextBtn").onclick = nextChannel;
}
/* RENDER */
function render(data){
list.innerHTML = "";
data.forEach(ch=>{
const div = document.createElement("div");
div.className = "channel";
div.id = ch.name;
div.innerHTML = `
<img src="${ch.logo}">
<div>${ch.name}</div>
`;
div.onclick = ()=>loadChannel(ch);
list.appendChild(div);
});
}

function nextChannel(){
let next = (currentIndex + 1) % channels.length;
loadChannel(channels[next]);
}

function prevChannel(){
let prev = (currentIndex - 1 + channels.length) % channels.length;
loadChannel(channels[prev]);
}
/* SEARCH */
document.getElementById("search").addEventListener("input",function(){
const val = this.value.toLowerCase();
const filtered = channels.filter(c =>
c.name.toLowerCase().includes(val)
);
render(filtered);
});
/* AUTO PLAY FIRST CHANNEL */
window.addEventListener("load",async()=>{

    await loadRemotePlaylist();

    render(channels);

    if(channels.length){

        loadChannel(channels[0]);

    }

});
</script>

<script>
  setTimeout(() => {
    document.querySelectorAll('img').forEach(img => {
      if (img.naturalWidth === 0) {
        img.src = 'https://www.iconpacks.net/icons/1/free-icon-broadcast-484.png';
      }
      img.addEventListener('error', function() {
        this.onerror = null; 
        this.src = 'https://www.iconpacks.net/icons/1/free-icon-broadcast-484.png';
      });
    });
  }, 2000);
</script>

</body>
</html>
